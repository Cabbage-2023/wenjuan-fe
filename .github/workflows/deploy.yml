name: Deploy Client-B

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. 修正目录名：是 frontend-b 不是 client-b
            cd ~/wenjuan-platform/frontend-b
            
            if [ ! -d ".git" ]; then
              git init
              # 这种写法更稳健：如果 origin 不存在则添加，存在则直接更新
              git remote set-url origin https://github.com/Cabbage-2023/wenjuan-frontend.git || git remote add origin https://github.com/Cabbage-2023/wenjuan-frontend.git
            fi

            git fetch --all
            git reset --hard origin/main

            # 2. 写入环境变量 (确保你在 GitHub Secret 里配置了 ENV_PROD)
            echo "${{ secrets.ENV_PROD }}" > .env.production

            cd ~/wenjuan-platform
            # 3. 修正 Service 名字：对应 docker-compose 里的 client-b
            docker compose build --no-cache client-b
            docker compose up -d client-b
            docker image prune -f