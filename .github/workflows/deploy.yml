name: Deploy Client-B

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. 进入服务器上 B 端代码所在的子目录
            cd ~/wenjuan-platform/client-b
            
            # 2. 如果该目录还不是 git 仓库，则进行初始化（仅第一次运行有效）
            if [ ! -d ".git" ]; then
              git init
              git remote add origin git@github.com:Cabbage-2023/wenjuan-frontend.git
            fi

            # 3. 强制同步代码：获取最新远程分支并覆盖本地改动
            # 这样可以避免你在服务器上随手改了点东西导致 git pull 冲突
            git fetch --all
            git reset --hard origin/main

            # 4. 从 GitHub Secret 动态创建 .env.production 文件
            # 使用 echo 命令将变量内容写入文件
            echo "${{ secrets.ENV_PROD }}" > .env.production

            # 5. 返回根目录，利用 docker-compose 重新构建 B 端镜像并启动
            cd ~/wenjuan-platform
            docker compose up -d --build client-b